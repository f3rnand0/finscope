<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Transaction Categorizer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: bold;
        }
        .amount-expense {
            color: #dc3545;
        }
        .amount-income {
            color: #198754;
        }
        .confidence-high {
            background-color: #d1e7dd;
        }
        .confidence-medium {
            background-color: #fff3cd;
        }
        .confidence-low {
            background-color: #f8d7da;
        }
        .drop-zone {
            border: 2px dashed #6c757d;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #0d6efd;
            background-color: #f8f9fa;
        }
        .transaction-row:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Transaction Categorizer</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link {% if request.endpoint == 'upload_page' %}active{% endif %}" href="/upload">Upload</a>
                <a class="nav-link {% if request.endpoint == 'review_page' %}active{% endif %}" href="/review">Review</a>
                <a class="nav-link {% if request.endpoint == 'export_page' %}active{% endif %}" href="/export">Export</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="bg-light text-center py-3 mt-5">
        <div class="container">
            <small class="text-muted">Local transaction categorization tool</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
